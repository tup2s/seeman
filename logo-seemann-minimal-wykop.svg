<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" role="img" aria-labelledby="title desc">
  <title id="title">SEEMANN - logo minimal wykop</title>
  <desc id="desc">Minimalistyczne logo SEEMANN ze znakiem inspirowanym przekrojem terenu i wykopem.</desc>
  <defs>
    <filter id="lift" x="-10%" y="-12%" width="120%" height="126%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="860" height="220" fill="#ffffff"/>

  <g filter="url(#lift)" transform="translate(42 42)">
    <rect width="776" height="136" rx="18" fill="#ffffff"/>

    <g transform="translate(36 28)">
      <path d="M6 23 H96" stroke="#111827" stroke-width="12" stroke-linecap="round"/>
      <path d="M7 50 H52 C64 50 74 43 84 34 L106 15" fill="none" stroke="#f59e0b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M7 77 H118" stroke="#263241" stroke-width="12" stroke-linecap="round"/>
    </g>

    <g transform="translate(188 24)">
      <text x="0" y="62"
        font-family="Inter, Arial, sans-serif"
        font-size="70"
        font-weight="900"
        letter-spacing="2"
        fill="#111827">SEEMANN</text>
      <path d="M2 84 H520" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/>
      <text x="4" y="114"
        font-family="Inter, Arial, sans-serif"
        font-size="16"
        font-weight="800"
        letter-spacing="4"
        fill="#4b5563">ROBOTY ZIEMNE  |  TRANSPORT  |  KOMUNALNE</text>
    </g>
  </g>
</svg>
