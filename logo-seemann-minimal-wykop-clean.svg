<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" role="img" aria-labelledby="title desc">
  <title id="title">SEEMANN - logo bez dopisku</title>
  <desc id="desc">Minimalistyczne logo SEEMANN ze znakiem inspirowanym przekrojem terenu i wykopem, bez małego dopisku.</desc>
  <defs>
    <filter id="lift" x="-10%" y="-12%" width="120%" height="126%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="760" height="180" fill="#ffffff"/>

  <g filter="url(#lift)" transform="translate(34 34)">
    <rect width="692" height="112" rx="18" fill="#ffffff"/>

    <g transform="translate(34 20)">
      <path d="M6 23 H96" stroke="#111827" stroke-width="12" stroke-linecap="round"/>
      <path d="M7 50 H52 C64 50 74 43 84 34 L106 15" fill="none" stroke="#f59e0b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M7 77 H118" stroke="#263241" stroke-width="12" stroke-linecap="round"/>
    </g>

    <g transform="translate(184 18)">
      <text x="0" y="62"
        font-family="Inter, Arial, sans-serif"
        font-size="74"
        font-weight="900"
        letter-spacing="2"
        fill="#111827">SEEMANN</text>
      <path d="M2 84 H470" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/>
    </g>
  </g>
</svg>
